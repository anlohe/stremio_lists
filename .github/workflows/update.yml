name: Actualizar Listas de Stremio

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Esto elimina la advertencia de Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-lists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar motor
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python script.py

      - name: Guardar y subir cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # El sistema inteligente: Solo guarda y sube si hay archivos nuevos o modificados
          git diff --staged --quiet || (git commit -m "Actualizacion automatica de listas" && git push origin main --force)
